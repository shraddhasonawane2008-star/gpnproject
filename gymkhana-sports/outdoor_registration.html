<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Outdoor Sports Registration</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<section class="page-banner outdoor-banner">

    <h1>Outdoor Sports Registration</h1>

    <p>
        Register for Outdoor Sports tournaments and represent your department in inter-college competitions.
    </p>

</section>



<div class="form-container">


<h1>Registration Form</h1>



<form action="outdoor_registration_success.html">



<div class="form-group">

<label>Full Name</label>

<input type="text" name="full_name" required>

</div>



<div class="form-group">

<label>Roll Number / PRN</label>

<input type="text" name="roll_no" required>

</div>



<div class="form-group">

<label>Department</label>

<select name="department" required>


<option value="">Select Department</option>

<option>Computer Technology</option>

<option>Information Technology</option>

<option>Mechanical Engineering</option>

<option>Civil Engineering</option>

<option>Electrical Engineering</option>

<option>Electronics and Telecommunications Engineering</option>

<option>Interior Designing & Decoration (IDD)</option>

<option>Dress Designing & Garment Manufacturing (DDGM)</option>


</select>

</div>




<div class="form-group">

<label>Year</label>

<select name="year" required>


<option value="">Select Year</option>

<option>1st Year</option>

<option>2nd Year</option>

<option>3rd Year</option>


</select>

</div>




<div class="form-group">

<label>Mobile Number</label>

<input type="text" name="mobile" required>

</div>




<div class="form-group">

<label>Email ID</label>

<input type="email" name="email" required>

</div>




<div class="form-group">

<label>Sport</label>

<select name="sport_name" required>


<option value="">Select Sport</option>

<option>Cricket</option>

<option>Football</option>

<option>Volleyball</option>

<option>Kabaddi</option>

<option>Badminton</option>

<option>Athletics</option>


</select>

</div>




<button type="submit" class="submit-btn">

Register

</button>



</form>


</div>


</body>

</html>
